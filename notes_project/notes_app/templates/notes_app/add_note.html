<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>New Entry | CyberNotes</title>
    <style>
        body { background-color: #0f051d; }
        .neon-input {
            background: #1a0b2e;
            border: 1px solid #7e22ce;
            color: #e9d5ff;
            box-shadow: inset 0 0 5px #7e22ce;
        }
        .neon-input:focus {
            outline: none;
            box-shadow: 0 0 15px #a855f7;
            border-color: #a855f7;
        }
    </style>
</head>
<body class="font-mono text-purple-200 p-4 md:p-8">

<div class="flex justify-between items-center mb-10">

    <!-- LEFT SIDE -->
    <div class="flex items-center gap-4">

        <a href="{% url 'index' %}"
           class="group flex items-center justify-center w-11 h-11 rounded-full border border-purple-500/30 bg-purple-950/40 hover:border-purple-400 hover:bg-purple-900/40 transition-all duration-300">

            <svg xmlns="http://www.w3.org/2000/svg"
                 class="w-5 h-5 text-purple-400 group-hover:text-purple-200 transition-colors"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="2">

                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 19l-7-7 7-7" />
            </svg>
        </a>

        <div>
            <p class="text-purple-500 text-xs uppercase tracking-[0.3em]">
                Logged in as
            </p>

            <p class="text-purple-300 font-bold">
                {{ request.user.username }}
            </p>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <form method="POST"
          action="{% url 'logout' %}"
          class="relative group">

        {% csrf_token %}

        <button type="submit"
            class="flex items-center justify-center w-11 h-11 rounded-full border border-purple-500/30 bg-purple-950/40 hover:border-red-400/60 hover:bg-red-500/10 transition-all duration-300">

<svg xmlns="http://www.w3.org/2000/svg"
     class="w-4 h-4 text-purple-400 group-hover:text-red-400 transition-colors"
     fill="none"
     viewBox="0 0 24 24"
     stroke="currentColor"
     stroke-width="2">
     
    <path stroke-linecap="round"
          stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1m0-10V7m0 0V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2h5a2 2 0 002-2v-1" />
</svg>

        </button>

        <!-- TOOLTIP -->
        <div class="absolute right-0 mt-2 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
            <div class="bg-purple-950 border border-purple-500/30 text-purple-300 text-xs px-3 py-1 rounded-lg whitespace-nowrap shadow-lg">
                Logout
            </div>
        </div>

    </form>

</div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <!-- Title: Now a wide, prominent input -->
            <div>
                <input type="text" name="title" 
                       class="w-full p-4 text-3xl font-bold rounded-t-xl neon-input border-b-0" 
                       placeholder="Entry Title..." required>
            </div>

            <!-- Content: A massive text area that feels like a document -->
            <div>
                <textarea name="content" rows="9" 
                          class="w-full p-6 text-lg rounded-b-xl neon-input transition-all" 
                          placeholder="Start typing your data here..." required></textarea>
            </div>

            <!-- Submit button moved to the right for "Save" feel -->
            <div class="flex justify-end">
                <button type="submit" 
                        class="bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 px-12 rounded-lg transition-all shadow-[0_0_15px_rgba(168,85,247,0.5)] hover:shadow-[0_0_25px_rgba(168,85,247,0.8)] uppercase tracking-widest">
                    Commit to Database
                </button>
            </div>
        </form>
    </div>

</body>
</html>
